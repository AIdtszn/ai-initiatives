<!DOCTYPE html>
<html lang="ru">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта инициатив — AI в социальной сфере Москвы</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 20px; }
  .container { max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; color: #16213e; }
  .subtitle { color: #555; margin-bottom: 20px; font-size: 14px; }
  .counter { background: #e8edf5; padding: 8px 14px; border-radius: 8px; font-size: 13px; color: #333; margin-bottom: 16px; display: inline-block; }

  .filters { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .search-row { margin-bottom: 12px; }
  .search-row input { width: 100%; padding: 9px 14px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 14px; outline: none; }
  .search-row input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
  .filter-groups { display: flex; flex-direction: column; gap: 6px; }
  .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
  .filter-label { font-size: 12px; font-weight: 600; color: #475569; min-width: 70px; }
  .group-chip { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; padding: 4px 12px; border-radius: 14px; border: 1px solid #d0d5dd; background: #fafafa; transition: .15s; user-select: none; }
  .group-chip:hover { border-color: #2563eb; }
  .group-chip.active { border-color: #2563eb; background: #eff4ff; }
  .sub-chip { display: flex; align-items: center; gap: 3px; font-size: 11px; cursor: pointer; padding: 2px 8px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; transition: .15s; user-select: none; }
  .sub-chip:hover { border-color: #94a3b8; }
  .sub-chip.active { border-color: #2563eb; background: #eff4ff; }
  .reset-btn { font-size: 12px; color: #2563eb; background: none; border: none; cursor: pointer; padding: 4px 8px; }
  .reset-btn:hover { text-decoration: underline; }

  .ref-toggle { background: #fff; border-radius: 10px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
  .ref-header { padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 600; color: #1e293b; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .ref-header:hover { background: #f8fafc; }
  .ref-body { padding: 0 20px 16px; display: none; }
  .ref-body.open { display: block; }
  .ref-group { margin-bottom: 12px; }
  .ref-group:last-child { margin-bottom: 0; }
  .ref-group-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ref-sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 5px; padding-left: 18px; }
  .ref-sub-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 4px 8px; background: #f8fafc; border-radius: 5px; }
  .ref-sub-item .desc { color: #64748b; font-size: 11px; }

  .group { background: #fff; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
  .group-header { padding: 14px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; transition: background .15s; }
  .group-header:hover { background: #f8fafc; }
  .group-header h2 { font-size: 15px; font-weight: 600; color: #0f172a; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .group-header .badge { background: #e2e8f0; color: #475569; font-size: 12px; padding: 1px 10px; border-radius: 10px; font-weight: 500; }
  .group-header .dept { font-size: 12px; color: #64748b; font-weight: 400; }
  .group-body { overflow-x: auto; }
  .group-body.collapsed { display: none; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 650px; }
  thead th { background: #f1f5f9; padding: 10px 6px; text-align: left; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; }
  tbody td { padding: 9px 6px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr.hidden { display: none; }
  .col-id { width: 26px; text-align: center; color: #94a3b8; font-size: 11px; }
  .col-title { min-width: 200px; }
  .col-title .desc { font-size: 11px; color: #64748b; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .tag-proposed { background: #fef3c7; color: #92400e; }
  .tag-pilot { background: #dbeafe; color: #1e40af; }
  .tag-implemented { background: #dcfce7; color: #166534; }
  .tag-planning { background: #f3e8ff; color: #6b21a8; }

  .expand-btn { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #10b981; background: none; color: #10b981; font-size: 13px; font-weight: 700; cursor: pointer; line-height: 1; margin-right: 6px; flex-shrink: 0; transition: .15s; }
  .expand-btn:hover { background: #10b981; color: #fff; }

  .gcount { font-size: 10px; font-weight: 400; color: #94a3b8; margin-left: 2px; }
  .group-cell { text-align: center; white-space: nowrap; min-width: 48px; }
  .group-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; opacity: .15; transition: .15s; cursor: default; }
  .group-dot.active { opacity: 1; box-shadow: 0 0 0 1px rgba(0,0,0,.08); }
  .group-dot-wrap { position: relative; display: inline-flex; }
  .group-tip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; pointer-events: none; z-index: 10; }
  .group-tip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: #1e293b; }
  .group-dot-wrap:hover .group-tip { display: block; }

  .col-comment { text-align: center; width: 28px; }
  .comment-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; opacity: .35; transition: .15s; line-height: 1; }
  .comment-btn:hover { opacity: 1; background: #f1f5f9; }
  .comment-btn.has-note { opacity: 1; }

  .comment-popup { position: fixed; z-index: 1000; background: #fff; border: 1px solid #d0d5dd; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12); padding: 0; width: 280px; display: none; }
  .comment-popup.open { display: block; }
  .comment-popup textarea { width: 100%; border: none; padding: 10px 12px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 60px; outline: none; border-radius: 8px 8px 0 0; line-height: 1.4; }
  .comment-popup .popup-footer { display: flex; justify-content: space-between; align-items: center; padding: 5px 12px 8px; border-top: 1px solid #f1f5f9; font-size: 11px; color: #94a3b8; }
  .comment-popup .popup-saved { color: #10b981; }
  .comment-popup .popup-clear { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
  .comment-popup .popup-clear:hover { background: #fef2f2; }
  .comment-overlay { position: fixed; inset: 0; z-index: 999; display: none; }
  .comment-overlay.open { display: block; }

  .sortable { cursor: pointer; user-select: none; }
  .sortable:hover { color: #2563eb; }
  .sarr { font-size: 10px; margin-left: 2px; }
  .complexity-bar { display: inline-flex; align-items: center; gap: 5px; }
  .complexity-bar .bar-track { width: 32px; height: 4px; background: #e2e8f0; border-radius: 3px; overflow: hidden; display: inline-block; }
  .complexity-bar .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .complexity-num { font-size: 12px; font-weight: 600; color: #475569; min-width: 14px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.6); z-index: 2000; display: none; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: block; }
  .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2001; background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.25); width: 90%; max-width: 640px; max-height: 85vh; display: none; flex-direction: column; }
  .modal.open { display: flex; }
  .modal-header { display: flex; align-items: flex-start; gap: 12px; padding: 20px 24px 0; }
  .modal-header h3 { font-size: 16px; line-height: 1.4; color: #0f172a; flex: 1; }
  .modal-close { background: none; border: none; font-size: 20px; color: #94a3b8; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; }
  .modal-close:hover { background: #f1f5f9; color: #475569; }
  .modal-body { padding: 16px 24px 24px; overflow-y: auto; flex: 1; }
  .modal-section { margin-bottom: 16px; }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .modal-text { font-size: 13px; line-height: 1.6; color: #1e293b; white-space: pre-wrap; }
  .modal-techs { display: flex; flex-wrap: wrap; gap: 5px; }
  .modal-tech-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 10px; border-radius: 10px; background: #f1f5f9; }
  .modal-tech-tag .mtdot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .modal-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: #475569; margin-bottom: 12px; }
  .modal-meta span { display: flex; align-items: center; gap: 4px; }

  @media (max-width: 768px) {
    body { padding: 10px; }
    .filters { padding: 12px; }
    .group-header { padding: 12px 14px; }
    thead th, tbody td { padding: 6px 4px; font-size: 11px; }
    .col-title { min-width: 120px; }
    .group-cell { min-width: 32px; }
    .modal { width: 95%; max-height: 90vh; }
    .modal-header, .modal-body { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Карта инициатив</h1>
  <div class="subtitle">Внедрение технологий искусственного интеллекта в социальной сфере города Москвы</div>

  <div class="counter" id="counter">Загрузка...</div>

  <div class="filters">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Поиск по названию или описанию...">
    </div>
    <div class="filter-groups" id="filterGroups"></div>
  </div>

  <div class="ref-toggle">
    <div class="ref-header" id="refHeader">
      <span>&#128218; Справочник технологий искусственного интеллекта</span>
      <span class="arrow" id="refArrow">&#9660;</span>
    </div>
    <div class="ref-body" id="refBody"></div>
  </div>

  <div id="groups"></div>

  <div class="comment-overlay" id="commentOverlay" onclick="closePopup()"></div>
  <div class="comment-popup" id="commentPopup">
    <textarea placeholder="Ваша заметка..." rows="3"></textarea>
    <div class="popup-footer">
      <span class="popup-saved"></span>
      <button class="popup-clear">Очистить</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  const GROUPS = [
    {
      id: 'llm', ru: 'LLM / Генеративный ИИ', color: '#6366f1',
      techs: [
        { id: 'nlp',       ru: 'Обработка естественного языка (NLP)',       desc: 'Анализ текста, классификация, суммаризация, работа с языковыми моделями' },
        { id: 'genai',     ru: 'Генеративный ИИ (GenAI / LLM)',            desc: 'Генерация текста, кода, инструкций, сценариев и методических материалов' },
        { id: 'assistant', ru: 'Виртуальные ассистенты и чат-боты',        desc: 'ИИ-консультанты, HR-капсулы, помощники операторов контакт-центров' },
        { id: 'knowledge', ru: 'Графы знаний и базы знаний',               desc: 'Семантический поиск, единая база с интеллектуальным поиском' },
        { id: 'emotion',   ru: 'Анализ тональности и эмоций',              desc: 'Определение настроения, эмоциональной окраски текста' },
      ]
    },
    {
      id: 'ml', ru: 'Машинное обучение (ML)', color: '#f59e0b',
      techs: [
        { id: 'predictive', ru: 'Предиктивная аналитика',                  desc: 'Прогнозирование, временные ряды, моделирование сценариев' },
        { id: 'recsys',     ru: 'Рекомендательные системы',                desc: 'Персональные подборки, индивидуальные траектории' },
        { id: 'anomaly',    ru: 'Выявление аномалий',                      desc: 'Обнаружение отклонений в поведении, расходах, вовлечённости' },
      ]
    },
    {
      id: 'cv', ru: 'Компьютерное зрение (CV)', color: '#14b8a6',
      techs: [
        { id: 'cv',  ru: 'Компьютерное зрение',                            desc: 'Распознавание изображений, детекция объектов и силуэтов' },
        { id: 'idp', ru: 'Интеллектуальная обработка документов (IDP/OCR)', desc: 'Распознавание и классификация документов, автоматизация документооборота' },
      ]
    },
    {
      id: 'speech', ru: 'Речевые технологии', color: '#0ea5e9',
      techs: [
        { id: 'speech',    ru: 'Речевая аналитика',                        desc: 'Распознавание речи, транскрибация, анализ диалогов, синтез речи' },
        { id: 'voice_bio', ru: 'Голосовая биометрия',                      desc: 'Верификация личности по голосу, идентификация звонящего' },
        { id: 'ivr',       ru: 'Интерактивное голосовое меню (IVR)',       desc: 'Автоматизация приёма звонков, тональный набор, маршрутизация' },
      ]
    },
    {
      id: 'dt', ru: 'Цифровые двойники (DT)', color: '#06b6d4',
      techs: [
        { id: 'digital_twin', ru: 'Цифровые двойники и симуляция',         desc: 'Моделирование систем, цифровые паспорта учреждений, сценарное планирование' },
      ]
    },
  ];

  const TECH_TO_GROUP = {};
  GROUPS.forEach(g => g.techs.forEach(t => { TECH_TO_GROUP[t.id] = g.id; }));
  const ALL_TECHS = GROUPS.flatMap(g => g.techs.map(t => ({ ...t, group: g.id, color: g.color })));

  const INITIATIVES = [
    {
      customer: 'Авшарян Л.Н.', dept: 'Управление стратегии долголетия и специальных проектов',
      items: [
        { id: 1, title: 'Цифровой консультант по базе знаний', techs: ['nlp','knowledge','genai'], status: 'proposed',
          desc: 'Ответы на вопросы работников на основании регламентов, инструкций и нормативных документов с обязательными ссылками на источники и учетом прав доступа.\n\nОжидаемый эффект: сокращение времени поиска информации и количества консультаций между подразделениями.\nУправленческая ценность: обеспечение единых стандартов работы и сохранение организационных знаний.' },
        { id: 2, title: 'Персональная траектория долголетия', techs: ['recsys','predictive'], status: 'proposed',
          desc: 'Создание индивидуальных рекомендаций по занятиям, мероприятиям, клубам и образовательным программам с учетом интересов, района проживания, физической доступности и истории участия.\n\nОжидаемый эффект: рост вовлеченности, посещаемости и удержания участников. Снижение доли людей, которые зарегистрировались, но не начали регулярно участвовать.\nУправленческая ценность: переход от массового предложения услуг к адресной работе с различными группами старшего поколения.' },
        { id: 3, title: 'ИИ-диспетчер обращений и заявок', techs: ['nlp','predictive'], status: 'proposed',
          desc: 'Автоматическая классификация обращений, поиск дублей, определение приоритета, подбор исполнителя, прогноз SLA и подготовка проекта ответа.\n\nОжидаемый эффект: сокращение времени обработки заявок, уменьшение числа ошибочных маршрутизаций и просрочек.\nУправленческая ценность: прозрачный контроль качества и скорости решения проблем участников и ЦМД.' },
        { id: 4, title: 'Прогноз посещаемости и загрузки ЦМД', techs: ['predictive'], status: 'proposed',
          desc: 'Прогнозирование посещений по центрам, дням недели, времени, направлениям и мероприятиям с учетом сезонности и календаря.\n\nОжидаемый эффект: снижение перегрузки и простоев помещений, более точное расписание, эффективное распределение сотрудников.\nУправленческая ценность: обоснованное планирование ресурсов и развитие сети ЦМД на основании прогнозного спроса.' },
        { id: 5, title: 'Раннее выявление снижения вовлеченности', techs: ['anomaly','predictive'], status: 'proposed',
          desc: 'Определение участников, которые стали реже посещать занятия или полностью прекратили участие. Формирование сценария мягкого контакта и альтернативных предложений.\n\nОжидаемый эффект: возвращение части участников, снижение социальной изоляции, повышение устойчивости вовлечения.\nУправленческая ценность: переход от фиксации оттока к профилактической работе. Использование — только с согласием и без автоматических социальных решений.' },
        { id: 6, title: 'ИИ-конструктор программ и мероприятий', techs: ['genai'], status: 'proposed',
          desc: 'Подготовка концепции мероприятия, сценария, программы, чек-листа, распределения ролей, сметы, рисков и коммуникационных материалов.\n\nОжидаемый эффект: сокращение времени подготовки мероприятий и повышение качества методических материалов.\nУправленческая ценность: масштабирование удачных форматов на разные округа и снижение зависимости от опыта отдельных сотрудников.' },
        { id: 7, title: 'Интеллектуальный анализ обратной связи', techs: ['nlp','emotion'], status: 'proposed',
          desc: 'Обработка отзывов, обращений, результатов опросов и комментариев: выделение тем, повторяющихся проблем, эмоциональной окраски и динамики.\n\nОжидаемый эффект: быстрое обнаружение системных проблем и снижение объема ручной обработки обратной связи.\nУправленческая ценность: единая картина удовлетворенности по городу, округам, ЦМД и направлениям деятельности.' },
        { id: 8, title: 'ИИ-помощник для проверок ЦМД', techs: ['cv','idp'], status: 'proposed',
          desc: 'Анализ чек-листов, документов и фотографий, поиск несоответствий, подготовка проекта акта и контроль устранения замечаний.\n\nОжидаемый эффект: сокращение времени проверок, повышение полноты фиксации нарушений и снижение субъективности.\nУправленческая ценность: сопоставимое качество контроля по всей сети и возможность выявлять повторяющиеся системные проблемы.' },
        { id: 9, title: 'Интеллектуальное планирование развития сети', techs: ['predictive'], status: 'proposed',

    return '<tr data-id="' + item.id + '">' +
      '<td class="col-id">' + item.id + '</td>' +
      '<td class="col-title"><div><button class="expand-btn" onclick="openModal(' + item.id + ')" title="Подробнее">+</button>' + item.title + '</div><div class="desc">' + item.desc.split('\n')[0] + '</div></td>' +
      '<td class="col-comment"><button class="comment-btn ' + (getComment(item.id) ? 'has-note' : '') + '" data-id="' + item.id + '" onclick="openComment(event, ' + item.id + ')">&#128172;</button></td>' +
      '<td class="col-complexity">' + genComplexity(item) + '</td>' +
      '<td class="col-status"><span class="tag ' + s.cls + '">' + s.label + '</span></td>' +
      GROUPS.map(g => {
        const active = activeGroupIds.has(g.id);
        const subTechs = item.techs.filter(t => groupOf(t) === g.id).map(t => { const f = ALL_TECHS.find(x => x.id === t); return f ? f.ru : t; });
        const tip = active ? subTechs.join(', ') : '';
        return '<td class="group-cell"><div class="group-dot-wrap"><span class="group-dot ' + (active ? 'active' : '') + '" style="background:' + g.color + '"></span>' + (tip ? '<span class="group-tip">' + tip + '</span>' : '') + '</div></td>';
      }).join('') + '</tr>';
  }

  function genComplexity(item) {
    const n = groupsOf(item).size;
    const pct = Math.round((n / GROUPS.length) * 100);
    const hue = 120 - (n / GROUPS.length) * 120;
    return '<span class="complexity-bar"><span class="complexity-num">' + n + '</span><span class="bar-track"><span class="bar-fill" style="width:' + pct + '%;background:hsl(' + hue + ',75%,50%)"></span></span></span>';
  }

  /* --- Filter Logic --- */
  function syncChips() {
    document.querySelectorAll('.group-chip').forEach(chip => {
      const gid = chip.dataset.group;
      const allActive = GROUPS.find(g => g.id === gid).techs.every(t => activeTechs.has(t.id));
      chip.classList.toggle('active', allActive);
    });
    document.querySelectorAll('.sub-chip').forEach(chip => {
      chip.classList.toggle('active', activeTechs.has(chip.dataset.tech));
    });
  }

  function toggleGroupTech(gid) {
    const g = GROUPS.find(x => x.id === gid);
    const all = g.techs.every(t => activeTechs.has(t.id));
    if (all) { g.techs.forEach(t => activeTechs.delete(t.id)); }
    else { g.techs.forEach(t => activeTechs.add(t.id)); }
    syncChips(); applyFilters();
  }

  function toggleTech(id) {
    if (activeTechs.has(id)) activeTechs.delete(id); else activeTechs.add(id);
    syncChips(); applyFilters();
  }

  function resetFilters() {
    activeTechs.clear();
    document.getElementById('searchInput').value = '';
    syncChips(); applyFilters();
  }

  function updateGroupCounters() {
    const visibleItems = allItems.filter(item => {
      const row = document.querySelector('tr[data-id="' + item.id + '"]');
      return row && !row.classList.contains('hidden');
    });
    GROUPS.forEach(g => {
      const used = new Set();
      visibleItems.forEach(item => {
        item.techs.forEach(t => { if (groupOf(t) === g.id) used.add(t); });
      });
      const el = document.querySelector('.gcount[data-g="' + g.id + '"]');
      if (el) el.textContent = used.size + '/' + g.techs.length;
    });
  }

  function applyFilters() {
    searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    let visibleCount = 0;
    document.querySelectorAll('.group').forEach(group => {
      let groupVisible = false;
      group.querySelectorAll('tbody tr').forEach(row => {
        const id = parseInt(row.dataset.id);
        const item = allItems.find(i => i.id === id);
        if (!item) return;
        let show = true;
        if (activeTechs.size > 0 && !item.techs.some(t => activeTechs.has(t))) show = false;
        if (show && searchTerm) {
          const haystack = (item.title + ' ' + item.desc).toLowerCase();
          if (!haystack.includes(searchTerm)) show = false;
        }
        row.classList.toggle('hidden', !show);
        if (show) groupVisible = true;
      });
      group.style.display = groupVisible ? '' : 'none';
      if (groupVisible) visibleCount += group.querySelectorAll('tbody tr:not(.hidden)').length;
    });
    document.getElementById('counter').textContent = activeTechs.size || searchTerm
      ? 'Всего инициатив: ' + allItems.length + ' | Отобрано: ' + visibleCount
      : 'Всего инициатив: ' + allItems.length;
    updateGroupCounters();
  }

  function toggleSort(key) {
    if (sortKey === key) sortDir = -sortDir;
    else { sortKey = key; sortDir = 1; }
    renderGroups(); applyFilters();
  }

  function sortKeyOf(key, item) {
    if (key === 'title') return item.title;
    if (key === 'complexity') return groupsOf(item).size;
    if (key === 'status') return item.status;
    return item.techs.some(t => groupOf(t) === key) ? 1 : 0;
  }

  function toggleGroup(header) {
    const body = header.nextElementSibling;
    const arrow = header.querySelector('.arrow');
    body.classList.toggle('collapsed');
    arrow.classList.toggle('open');
  }

  /* --- Comments --- */
  function getComment(id) { return localStorage.getItem('oc_comment_' + id) || ''; }
  function saveComment(id, text) {
    if (text.trim()) localStorage.setItem('oc_comment_' + id, text.trim());
    else localStorage.removeItem('oc_comment_' + id);
  }

  function openComment(ev, id) {
    ev.stopPropagation();
    closePopup();
    const btn = ev.currentTarget;
    const rect = btn.getBoundingClientRect();
    const popup = document.getElementById('commentPopup');
    const overlay = document.getElementById('commentOverlay');
    const textarea = popup.querySelector('textarea');
    const saved = popup.querySelector('.popup-saved');
    const clearBtn = popup.querySelector('.popup-clear');
    textarea.value = getComment(id);
    saved.textContent = textarea.value ? 'Сохранено' : '';
    popup.style.top = (rect.bottom + 6) + 'px';
    popup.style.left = Math.min(rect.left - 120, window.innerWidth - 300) + 'px';
    if (parseInt(popup.style.left) < 10) popup.style.left = '10px';
    popup.classList.add('open');
    overlay.classList.add('open');
    textarea.focus();
    textarea.oninput = function() {
      saveComment(id, this.value);
      saved.textContent = this.value.trim() ? 'Сохранено' : '';
      const b = document.querySelector('.comment-btn[data-id="' + id + '"]');
      if (b) b.classList.toggle('has-note', !!this.value.trim());
    };
    clearBtn.onclick = function(e) {
      e.stopPropagation();
      textarea.value = '';
      saveComment(id, '');
      saved.textContent = '';
      const b = document.querySelector('.comment-btn[data-id="' + id + '"]');
      if (b) b.classList.remove('has-note');
      textarea.focus();
    };
  }

  function closePopup() {
    document.getElementById('commentPopup').classList.remove('open');
    document.getElementById('commentOverlay').classList.remove('open');
  }

  /* --- Modal --- */
  function openModal(id) {
    const item = allItems.find(i => i.id === id);
    if (!item) return;
    const techGroups = {};
    item.techs.forEach(tid => {
      const gid = groupOf(tid);
      if (!techGroups[gid]) techGroups[gid] = [];
      const t = ALL_TECHS.find(x => x.id === tid);
      if (t) techGroups[gid].push(t);
    });

    document.getElementById('modalTitle').textContent = item.title;
    const s = STATUS_MAP[item.status] || STATUS_MAP.proposed;
    document.getElementById('modalBody').innerHTML =
      '<div class="modal-meta">' +
      '<span>&#128101; ' + item._customer + ' (' + item._dept + ')</span>' +
      '<span class="tag ' + s.cls + '">' + s.label + '</span>' +
      '<span>&#128200; Охват: ' + groupsOf(item).size + ' из ' + GROUPS.length + ' групп</span>' +
      '</div>' +
      '<div class="modal-section"><div class="modal-label">Описание</div><div class="modal-text">' + item.desc + '</div></div>' +
      '<div class="modal-section"><div class="modal-label">Технологии (' + item.techs.length + ')</div><div class="modal-techs">' +
      Object.entries(techGroups).map(([gid, techs]) =>
        techs.map(t => '<span class="modal-tech-tag"><span class="mtdot" style="background:' + t.color + '"></span>' + t.ru + '</span>').join('')
      ).join('') + '</div></div>' +
      (getComment(id) ? '<div class="modal-section"><div class="modal-label">Ваша заметка</div><div class="modal-text" style="color:#64748b;font-size:12px">' + getComment(id) + '</div></div>' : '');

    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeModal(); closePopup(); }
  });

  /* --- Init --- */
  renderRef();
  renderFilters();
  renderGroups();
  applyFilters();
  syncChips();

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('refHeader').addEventListener('click', function() {
    document.getElementById('refBody').classList.toggle('open');
  });
</script>
</body>
</html>
