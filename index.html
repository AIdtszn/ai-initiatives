<!DOCTYPE html>
<html lang="ru">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта инициатив — AI в социальной сфере Москвы</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 20px; }
  .container { max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; color: #16213e; }
  .subtitle { color: #555; margin-bottom: 20px; font-size: 14px; }
  .counter { background: #e8edf5; padding: 8px 14px; border-radius: 8px; font-size: 13px; color: #333; margin-bottom: 16px; display: inline-block; }

  .filters { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .search-row { margin-bottom: 12px; }
  .search-row input { width: 100%; padding: 9px 14px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 14px; outline: none; }
  .search-row input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
  .filter-groups { display: flex; flex-direction: column; gap: 6px; }
  .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
  .filter-label { font-size: 12px; font-weight: 600; color: #475569; min-width: 70px; }
  .group-chip { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; padding: 4px 12px; border-radius: 14px; border: 1px solid #d0d5dd; background: #fafafa; transition: .15s; user-select: none; }
  .group-chip:hover { border-color: #2563eb; }
  .group-chip.active { border-color: #2563eb; background: #eff4ff; }
  .group-chip .gdot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .sub-chip { display: flex; align-items: center; gap: 3px; font-size: 11px; cursor: pointer; padding: 2px 8px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; transition: .15s; user-select: none; }
  .sub-chip:hover { border-color: #94a3b8; }
  .sub-chip.active { border-color: #2563eb; background: #eff4ff; }
  .sub-chip .sdot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .reset-btn { font-size: 12px; color: #2563eb; background: none; border: none; cursor: pointer; padding: 4px 8px; }
  .reset-btn:hover { text-decoration: underline; }

  .ref-toggle { background: #fff; border-radius: 10px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
  .ref-header { padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 600; color: #1e293b; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .ref-header:hover { background: #f8fafc; }
  .ref-body { padding: 0 20px 16px; display: none; }
  .ref-body.open { display: block; }
  .ref-group { margin-bottom: 12px; }
  .ref-group:last-child { margin-bottom: 0; }
  .ref-group-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ref-group-title .rgdot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .ref-sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 5px; padding-left: 18px; }
  .ref-sub-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 4px 8px; background: #f8fafc; border-radius: 5px; }
  .ref-sub-item .rsdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ref-sub-item .desc { color: #64748b; font-size: 11px; }

  .group { background: #fff; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
  .group-header { padding: 14px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; transition: background .15s; }
  .group-header:hover { background: #f8fafc; }
  .group-header h2 { font-size: 15px; font-weight: 600; color: #0f172a; display: flex; align-items: center; gap: 10px; }
  .group-header .badge { background: #e2e8f0; color: #475569; font-size: 12px; padding: 1px 10px; border-radius: 10px; font-weight: 500; }
  .group-header .dept { font-size: 12px; color: #64748b; font-weight: 400; }
  .group-body { overflow-x: auto; }
  .group-body.collapsed { display: none; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
  thead th { background: #f1f5f9; padding: 10px 8px; text-align: left; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; }
  tbody td { padding: 9px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr.hidden { display: none; }
  .col-id { width: 28px; text-align: center; color: #94a3b8; font-size: 11px; }
  .col-title { min-width: 200px; }
  .col-title .desc { font-size: 11px; color: #64748b; margin-top: 2px; line-height: 1.3; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .tag-proposed { background: #fef3c7; color: #92400e; }
  .tag-pilot { background: #dbeafe; color: #1e40af; }
  .tag-implemented { background: #dcfce7; color: #166534; }
  .tag-planning { background: #f3e8ff; color: #6b21a8; }

  .group-cell { text-align: center; white-space: nowrap; min-width: 52px; }
  .group-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; opacity: .15; transition: .15s; cursor: default; }
  .group-dot.active { opacity: 1; box-shadow: 0 0 0 1px rgba(0,0,0,.08); }
  .group-dot-wrap { position: relative; display: inline-flex; }
  .group-tip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; pointer-events: none; z-index: 10; }
  .group-tip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: #1e293b; }
  .group-dot-wrap:hover .group-tip { display: block; }

  .col-comment { text-align: center; width: 30px; }
  .comment-btn { background: none; border: none; cursor: pointer; font-size: 15px; padding: 2px 4px; border-radius: 4px; opacity: .35; transition: .15s; line-height: 1; }
  .comment-btn:hover { opacity: 1; background: #f1f5f9; }
  .comment-btn.has-note { opacity: 1; }

  .comment-popup { position: fixed; z-index: 1000; background: #fff; border: 1px solid #d0d5dd; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12); padding: 0; width: 280px; display: none; }
  .comment-popup.open { display: block; }
  .comment-popup textarea { width: 100%; border: none; padding: 10px 12px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 60px; outline: none; border-radius: 8px 8px 0 0; line-height: 1.4; }
  .comment-popup .popup-footer { display: flex; justify-content: space-between; align-items: center; padding: 5px 12px 8px; border-top: 1px solid #f1f5f9; font-size: 11px; color: #94a3b8; }
  .comment-popup .popup-saved { color: #10b981; }
  .comment-popup .popup-clear { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
  .comment-popup .popup-clear:hover { background: #fef2f2; }
  .comment-overlay { position: fixed; inset: 0; z-index: 999; display: none; }
  .comment-overlay.open { display: block; }

  .sortable { cursor: pointer; user-select: none; }
  .sortable:hover { color: #2563eb; }
  .sarr { font-size: 10px; margin-left: 2px; }
  .complexity-bar { display: inline-flex; align-items: center; gap: 5px; }
  .complexity-bar .bar-track { width: 36px; height: 4px; background: #e2e8f0; border-radius: 3px; overflow: hidden; display: inline-block; }
  .complexity-bar .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .complexity-num { font-size: 12px; font-weight: 600; color: #475569; min-width: 14px; }

  @media (max-width: 768px) {
    body { padding: 10px; }
    .filters { padding: 12px; }
    .group-header { padding: 12px 14px; }
    thead th, tbody td { padding: 6px 5px; font-size: 12px; }
    .col-title { min-width: 120px; }
    .group-cell { min-width: 36px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Карта инициатив</h1>
  <div class="subtitle">Внедрение технологий искусственного интеллекта в социальной сфере города Москвы</div>

  <div class="counter" id="counter">Загрузка...</div>

  <div class="filters">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Поиск по названию или описанию...">
    </div>
    <div class="filter-groups" id="filterGroups"></div>
  </div>

  <div class="ref-toggle">
    <div class="ref-header" id="refHeader">
      <span>📖 Справочник технологий искусственного интеллекта</span>
      <span class="arrow" id="refArrow">&#9660;</span>
    </div>
    <div class="ref-body" id="refBody"></div>
  </div>

  <div id="groups"></div>

  <div class="comment-overlay" id="commentOverlay" onclick="closePopup()"></div>
  <div class="comment-popup" id="commentPopup">
    <textarea placeholder="Ваша заметка..." rows="3"></textarea>
    <div class="popup-footer">
      <span class="popup-saved"></span>
      <button class="popup-clear">Очистить</button>
    </div>
  </div>
</div>

      items: [
        { id: 24, title: 'Голосовые ИИ-технологии для автоматизации обзвонов и мониторинга 73 000 граждан', techs: ['speech','voice_bio','emotion','assistant'], status: 'proposed',
          desc: 'Распознавание речи, верификация личности, экстренное реагирование, интеграция с голосовым ассистентом «Алиса» для граждан с ментальными дефицитами, ИИ-чекапы для оценки способности к самообслуживанию' },
        { id: 25, title: 'Интеллектуальная фотофиксация контроля качества социальных услуг', techs: ['cv'], status: 'proposed',
          desc: 'Верификация в реальном времени (наложение контура предыдущего кадра), сквозной фотоанализ из трёх источников, автоматическое выявление рисков изменения условий проживания' },
        { id: 26, title: 'ИИ-технология признания граждан нуждающимися в социальном обслуживании', techs: ['nlp','idp'], status: 'pilot',
          desc: 'Внедрение в ИС «Система долговременного ухода и социальные стационары» совместно с ГКУ «Инфогород» для оптимизации трудозатрат' },
      ]
    },
    {
      customer: 'Табурчану А.В.', dept: 'Управление по социальной интеграции лиц с ограничениями жизнедеятельности',
      items: [
        { id: 27, title: 'ИИ-поддержка специалистов системы комплексной реабилитации', techs: ['assistant','knowledge','nlp','speech'], status: 'proposed',
          desc: 'Интеллектуальная поддержка операторов контакт-центра и специалистов по маршрутизации, единая база знаний с интеллектуальным поиском, ИИ-помощник с прослушиванием звонков в реальном времени, интеграция с МИССО' },
        { id: 28, title: 'Цифровой двойник системы комплексной реабилитации', techs: ['digital_twin','predictive'], status: 'proposed',
          desc: 'Мониторинг загрузки учреждений, коечного фонда и кадровых ресурсов, прогнозирование, моделирование сценариев, цифровые паспорта учреждений, автоматизированная отчётность' },
        { id: 29, title: 'Сервисы цифрового сопровождения граждан в реабилитации', techs: ['idp'], status: 'proposed',
          desc: 'Электронная подача заявлений, цифровое сопровождение маршрута реабилитации, контроль статуса услуг, электронная запись, уведомления и документы' },
      ]
    },
    {
      customer: 'Фирсова Т.И.', dept: 'Управление организации стационарного социального обслуживания',
      items: [
        { id: 30, title: 'Речевой анализатор экстренных состояний «ВербAI» (телефон 051)', techs: ['speech','emotion'], status: 'pilot',
          desc: 'Пилотный проект для телефона неотложной психологической помощи. ДИТ проводит предпроектное обследование. Функционал ИИ-ассистента в реальном времени пока не реализован' },
        { id: 31, title: 'ИИ-помощник Координационного центра стационарного социального обслуживания', techs: ['speech','assistant'], status: 'proposed',
          desc: 'Прослушивание звонков в реальном времени, вывод вспомогательной информации, варианты ответов, ссылки на НПА, интеграция с ИС СДУ' },
        { id: 32, title: 'IVR (интерактивное голосовое меню) в CRM-системе', techs: ['ivr','speech'], status: 'planning',
          desc: 'Приветствие, тональный набор (DTMF), инструкции, маршрутизация, справочная информация, сбор данных до соединения, аналитика' },
      ]
    },
  ];

  const STATUS_MAP = {
    proposed: { label: 'Предложено', cls: 'tag-proposed' },
    pilot: { label: 'Пилот', cls: 'tag-pilot' },
    implemented: { label: 'Внедрено', cls: 'tag-implemented' },
    planning: { label: 'Планируется', cls: 'tag-planning' },
  };

  /* --- Data --- */
  let allItems = [];
  INITIATIVES.forEach(g => g.items.forEach(i => { allItems.push(i); i._customer = g.customer; i._dept = g.dept; }));

  /* --- State --- */
  let activeGroups = new Set();
  let activeTechs = new Set();
  let searchTerm = '';
  let sortKey = '';
  let sortDir = 1;

  function groupOf(techId) { return TECH_TO_GROUP[techId]; }
  function groupsOf(item) { const s = new Set(); item.techs.forEach(t => s.add(groupOf(t))); return s; }

  /* --- Render: Reference --- */
  function renderRef() {
    const body = document.getElementById('refBody');
    body.innerHTML = GROUPS.map(g =>
      '<div class="ref-group"><div class="ref-group-title"><span class="rgdot" style="background:' + g.color + '"></span>' + g.ru + '</div>' +
      '<div class="ref-sub-grid">' + g.techs.map(t =>
        '<div class="ref-sub-item"><span class="rsdot" style="background:' + g.color + '"></span><div><strong>' + t.ru + '</strong><div class="desc">' + t.desc + '</div></div></div>'
      ).join('') + '</div></div>'
    ).join('');
  }

  /* --- Render: Filters --- */
  function renderFilters() {
    const container = document.getElementById('filterGroups');
    let html = '<div class="filter-row"><span style="font-size:13px;font-weight:600;color:#475569">Фильтр:</span>' +
      GROUPS.map(g => `<div class="group-chip" data-group="${g.id}" onclick="toggleGroupTech('${g.id}')"><span class="gdot" style="background:${g.color}"></span>${g.ru}</div>`).join('') +
      '<button class="reset-btn" onclick="resetFilters()">Сбросить</button></div>';

    GROUPS.forEach(g => {
      html += '<div class="filter-row"><span class="filter-label" style="color:' + g.color + '">' + g.id.toUpperCase() + ':</span>' +
        g.techs.map(t => `<div class="sub-chip" data-tech="${t.id}" onclick="toggleTech('${t.id}')"><span class="sdot" style="background:${g.color}"></span>${t.ru}</div>`).join('') + '</div>';
    });

    container.innerHTML = html;
  }

  /* --- Render: Groups (customer sections) --- */
  function sorted(items) {
    if (!sortKey) return items.slice();
    const copy = items.slice();
    copy.sort((a, b) => {
      let va, vb;
      if (sortKey === 'title') { va = a.title; vb = b.title; }
      else if (sortKey === 'complexity') { va = groupsOf(a).size; vb = groupsOf(b).size; }
      else if (sortKey === 'status') { va = a.status; vb = b.status; }
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
    return copy;
  }

  function renderGroups() {
    const container = document.getElementById('groups');
    container.innerHTML = INITIATIVES.map(g => {
      const rows = sorted(g.items).map(item => genRow(item)).join('');
      return `<div class="group">
        <div class="group-header" onclick="toggleGroup(this)">
          <h2>${g.customer} <span class="dept">${g.dept}</span> <span class="badge">${g.items.length}</span></h2>
          <span class="arrow">&#9660;</span>
        </div>
        <div class="group-body"><table>${genThead()}<tbody>${rows}</tbody></table></div>
      </div>`;
    }).join('');
  }

  function genThead() {
    const sortArrow = (key) => sortKey === key ? (sortDir === 1 ? ' ▲' : ' ▼') : ' ↕';
    return '<thead><tr><th class="col-id">#</th>' +
      '<th class="col-title sortable" onclick="toggleSort(\'title\')">Инициатива <span class="sarr">' + sortArrow('title') + '</span></th>' +
      '<th class="col-comment">📝</th>' +
      '<th class="col-complexity sortable" onclick="toggleSort(\'complexity\')">Охват <span class="sarr">' + sortArrow('complexity') + '</span></th>' +
      '<th class="col-status sortable" onclick="toggleSort(\'status\')">Статус <span class="sarr">' + sortArrow('status') + '</span></th>' +
      GROUPS.map(g => `<th class="group-cell" title="${g.ru}"><span class="gdot" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${g.color}"></span> ${g.ru.replace(/\(.*/, '').trim()}</th>`).join('') +
      '</tr></thead>';
  }

  function genRow(item) {
    const s = STATUS_MAP[item.status] || STATUS_MAP.proposed;
    const activeGroupIds = groupsOf(item);
    return `<tr data-id="${item.id}">
      <td class="col-id">${item.id}</td>
      <td class="col-title"><div>${item.title}</div><div class="desc">${item.desc}</div></td>
      <td class="col-comment"><button class="comment-btn ${getComment(item.id) ? 'has-note' : ''}" data-id="${item.id}" onclick="openComment(event, ${item.id})">💬</button></td>
      <td class="col-complexity">${genComplexity(item)}</td>
      <td class="col-status"><span class="tag ${s.cls}">${s.label}</span></td>
      ${GROUPS.map(g => {
        const active = activeGroupIds.has(g.id);
        const subTechs = item.techs.filter(t => groupOf(t) === g.id).map(t => { const found = ALL_TECHS.find(x => x.id === t); return found ? found.ru : t; });
        const tip = active ? subTechs.join(', ') : '';
        return '<td class="group-cell"><div class="group-dot-wrap"><span class="group-dot ' + (active ? 'active' : '') + '" style="background:' + g.color + '"></span>' +
          (tip ? '<span class="group-tip">' + tip + '</span>' : '') + '</div></td>';
      }).join('')}
    </tr>`;
  }

  function genComplexity(item) {
    const n = groupsOf(item).size;
    const pct = Math.round((n / GROUPS.length) * 100);
    const hue = 120 - (n / GROUPS.length) * 120;
    return `<span class="complexity-bar"><span class="complexity-num">${n}</span><span class="bar-track"><span class="bar-fill" style="width:${pct}%;background:hsl(${hue},75%,50%)"></span></span></span>`;
  }

  /* --- Filters --- */
  function syncChips() {
    document.querySelectorAll('.group-chip').forEach(chip => {
      const gid = chip.dataset.group;
      const allActive = GROUPS.find(g => g.id === gid).techs.every(t => activeTechs.has(t.id));
      const someActive = GROUPS.find(g => g.id === gid).techs.some(t => activeTechs.has(t.id));
      chip.classList.toggle('active', allActive);
      chip.style.borderColor = someActive ? GROUPS.find(g => g.id === gid).color : '';
    });
    document.querySelectorAll('.sub-chip').forEach(chip => {
      chip.classList.toggle('active', activeTechs.has(chip.dataset.tech));
    });
  }

  function toggleGroupTech(gid) {
    const g = GROUPS.find(x => x.id === gid);
    const all = g.techs.every(t => activeTechs.has(t.id));
    if (all) { g.techs.forEach(t => activeTechs.delete(t.id)); }
    else { g.techs.forEach(t => activeTechs.add(t.id)); }
    syncChips();
    applyFilters();
  }

  function toggleTech(id) {
    if (activeTechs.has(id)) activeTechs.delete(id); else activeTechs.add(id);
    syncChips();
    applyFilters();
  }

  function resetFilters() {
    activeTechs.clear();
    document.getElementById('searchInput').value = '';
    syncChips();
    applyFilters();
  }

  function applyFilters() {
    searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    let visibleCount = 0;

    document.querySelectorAll('.group').forEach(group => {
      let groupVisible = false;
      group.querySelectorAll('tbody tr').forEach(row => {
        const id = parseInt(row.dataset.id);
        const item = allItems.find(i => i.id === id);
        if (!item) return;

        let show = true;
        if (activeTechs.size > 0) {
          if (!item.techs.some(t => activeTechs.has(t))) show = false;
        }
        if (show && searchTerm) {
          const haystack = (item.title + ' ' + item.desc).toLowerCase();
          if (!haystack.includes(searchTerm)) show = false;
        }
        row.classList.toggle('hidden', !show);
        if (show) groupVisible = true;
      });
      group.style.display = groupVisible ? '' : 'none';
      if (groupVisible) visibleCount += group.querySelectorAll('tbody tr:not(.hidden)').length;
    });

    const total = allItems.length;
    const label = activeTechs.size || searchTerm
      ? 'Всего инициатив: ' + total + ' | Отобрано: ' + visibleCount
      : 'Всего инициатив: ' + total;
    document.getElementById('counter').textContent = label;
  }

  function toggleSort(key) {
    if (sortKey === key) { sortDir = -sortDir; }
    else { sortKey = key; sortDir = 1; }
    renderGroups();
    applyFilters();
  }

  function toggleGroup(header) {
    const body = header.nextElementSibling;
    const arrow = header.querySelector('.arrow');
    body.classList.toggle('collapsed');
    arrow.classList.toggle('open');
  }

  /* --- Comments --- */
  function getComment(id) { return localStorage.getItem('oc_comment_' + id) || ''; }
  function saveComment(id, text) {
    if (text.trim()) localStorage.setItem('oc_comment_' + id, text.trim());
    else localStorage.removeItem('oc_comment_' + id);
  }

  let openPopupId = null;

  function openComment(ev, id) {
    ev.stopPropagation();
    closePopup();
    const btn = ev.currentTarget;
    const rect = btn.getBoundingClientRect();
    const popup = document.getElementById('commentPopup');
    const overlay = document.getElementById('commentOverlay');
    const textarea = popup.querySelector('textarea');
    const saved = popup.querySelector('.popup-saved');
    const clearBtn = popup.querySelector('.popup-clear');

    textarea.value = getComment(id);
    saved.textContent = textarea.value ? 'Сохранено' : '';
    popup.style.top = (rect.bottom + 6) + 'px';
    popup.style.left = Math.min(rect.left - 120, window.innerWidth - 300) + 'px';
    if (popup.style.left < 10) popup.style.left = '10px';
    popup.classList.add('open');
    overlay.classList.add('open');
    openPopupId = id;
    textarea.focus();

    textarea.oninput = function() {
      saveComment(id, this.value);
      saved.textContent = this.value.trim() ? 'Сохранено' : '';
      const b = document.querySelector('.comment-btn[data-id="' + id + '"]');
      if (b) b.classList.toggle('has-note', !!this.value.trim());
    };
    clearBtn.onclick = function(e) {
      e.stopPropagation();
      textarea.value = '';
      saveComment(id, '');
      saved.textContent = '';
      const b = document.querySelector('.comment-btn[data-id="' + id + '"]');
      if (b) b.classList.remove('has-note');
      textarea.focus();
    };
  }

  function closePopup() {
    document.getElementById('commentPopup').classList.remove('open');
    document.getElementById('commentOverlay').classList.remove('open');
    openPopupId = null;
  }

  /* --- Init --- */
  renderRef();
  renderFilters();
  renderGroups();
  applyFilters();
  syncChips();

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('refHeader').addEventListener('click', function() {
    document.getElementById('refBody').classList.toggle('open');
    document.getElementById('refArrow').classList.toggle('open');
  });
</script>
</body>
</html>
